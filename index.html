<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>GRIDZ</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <aside id="sidebar">
            <h2>HOW TO PLAY</h2>
            <p>1. Tap to place letters.</p>
            <p>2. Form 4-letter words to clear.</p>
        </aside>
        
        <main>
            <h1>GRIDZ</h1>
            <div id="score-board">Score: 0</div>
            <div id="grid"></div> <div id="next-letter">Next: -</div>
        </main>

        <aside id="legends">
            <h2>TOP 5 LEGENDS</h2>
            <ul id="high-scores"></ul>
        </aside>
    </div>
    <script src="script.js"></script>
</body>
</html>
